<!DOCTYPE html>
<html>
<head>
    <title>Student Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1 class="display-4 fw-bold">🎓 Student Performance Analytics</h1>
    <p class="lead mt-3">
        Analyze student performance, detect risks, and improve results efficiently.
    </p>

    <div class="mt-4">
        <a href="/login" class="btn btn-primary btn-lg me-3">Login</a>
        <a href="/register" class="btn btn-outline-dark btn-lg">Register</a>
    </div>

    <!-- Features -->
    <div class="row mt-5">

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5>📊 Analytics Dashboard</h5>
                <p>Track performance with charts & insights</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5>⚠ Risk Detection</h5>
                <p>Identify low-performing students early</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5>📁 Reports</h5>
                <p>Download student reports in CSV format</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
