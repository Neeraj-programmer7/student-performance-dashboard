<!DOCTYPE html>
<html>

<head>
  <title>Student Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="d-flex align-items-center">

      <span class="text-white me-3">
        👤 {{ session.get('username') }}
      </span>

      <a class="btn btn-outline-light me-2" href="/">Home</a>
      <a class="btn btn-outline-light me-2" href="/add">Add Student</a>
      <a class="btn btn-outline-light me-2" href="/students">View Students</a>

      <a href="/subjects" class="btn btn-secondary me-2">
        Manage Subjects
      </a>

      <a href="/logout" class="btn btn-danger">
        Logout
      </a>

    </div>
  </nav>

  <div class="container mt-4">
    {% block content %}
    {% endblock %}
  </div>

</body>

</html>
