<!DOCTYPE html>
<html>

<head>
  <title>Student Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background: linear-gradient(135deg,#1d2671,#c33764);
      color: white;
      min-height: 100vh;
    }
    .glass{
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      padding: 20px;
    }
    .glass:hover{
      transform: scale(1.03);
      transition: 0.3s;
      
    }
    .navbar{
      background: rgba(0,0,0,0.6) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .navbar-brand{
      letter-spacing: 1px;
    }
    .nav-link{
      font-size: 14px;
    }
    .nav-link:hover{
      color: white;
      background: rgba(12, 152, 38, 0.2);
      border-radius: 10px;
    }
    .btn-custom{
      border-radius: 10px;
      font-weight: 500;
    }
    .card{
      border: none;
      border-radius: 15px;
    }
  </style>
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark px-4">
    
    <!-- 🔥 BRAND NAME -->
    <a class="navbar-brand fw-bold fs-4" href="/dashboard">
        📊 Student Analytics
    </a>

    <!-- TOGGLE (for mobile) -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- NAV ITEMS -->
    <div class="collapse navbar-collapse justify-content-between" id="navbarNav">

        <!-- LEFT SIDE LINKS -->
        <div class="navbar-nav">
            <a class="nav-link btn btn-outline-light btn-custom mx-1" href="/dashboard">Home</a>
            <a class="nav-link btn btn-outline-light btn-custom mx-1" href="/add">Add Student</a>
            <a class="nav-link btn btn-outline-light btn-custom mx-1" href="/students">Students</a>
            <a class="nav-link btn btn-outline-light btn-custom mx-1" href="/subjects">Subjects</a>
        </div>

        <!-- RIGHT SIDE USER -->
        <div class="d-flex align-items-center">
            <span class="me-3">👤 {{ session.username }}</span>
            <a class="btn btn-danger btn-custom" href="/logout">Logout</a>
        </div>

    </div>
</nav>

  <div class="container mt-4 glass">
    {% block content %}
    {% endblock %}
  </div>

</body>

</html>
